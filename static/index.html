<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Secure Messenger</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Secure Messenger</h1>
        <div class="mode-switch">
            <button class="mode-btn active" id="btnEncrypt" onclick="setEncrypt()">Encrypt</button>
            <button class="mode-btn" id="btnDecrypt" onclick="setDecrypt()">Decrypt</button>
        </div>
        <textarea id="inputText" placeholder="Enter your message..."></textarea>
        <button class="action-btn" id="actionBtn" onclick="doProcess()">Encrypt</button>
        <div class="result" id="resultBox"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyResult()">Copy</button>
        <div class="error" id="errorBox"></div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
